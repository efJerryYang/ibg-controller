name: Release image

# Triggers on any `v*` tag push. Builds the shipped Dockerfile, pushes
# it to GitHub Container Registry, generates an SPDX SBOM, and signs
# both the image and the SBOM with cosign using keyless signing
# (OIDC via GitHub Actions) so consumers can verify provenance
# without us distributing a private key.
#
# Extensibility notes for contributors:
#   - The image is published to ghcr.io/${{ github.repository }} —
#     i.e. ghcr.io/<owner>/<repo>. Forks publish to their own
#     namespace automatically, no secrets setup required beyond the
#     default GITHUB_TOKEN.
#   - The `platforms` list below controls architectures. We publish
#     linux/amd64 + linux/arm64: upstream gnzsnz/ib-gateway ships both
#     (amd64 uses install4j JRE, arm64 uses Zulu), and the Dockerfile's
#     ATK bridge step handles both JRE layouts. Keep this list in sync
#     with `docker-compose` consumers that pin --platform.
#   - If you rename the workflow file, update docs/SECURITY.md's
#     cosign verification example — the `--certificate-identity`
#     field includes the workflow file path.

on:
  # Fires on any `v*` tag push, in parallel with ci.yml. The SBOM
  # upload step polls until ci.yml's `Create GitHub Release` step
  # has produced the release object (with the tarball attached), so
  # attachment order is deterministic even though the workflows run
  # concurrently.
  #
  # We can't use `on: release: types: [published]` because
  # ci.yml creates the release via GITHUB_TOKEN, and GitHub
  # intentionally suppresses downstream workflow triggers from
  # GITHUB_TOKEN-originated events (recursion guard). Using a PAT
  # would route around that but adds a secret to manage, which is
  # worse supply-chain hygiene than a 30s poll.
  push:
    tags: ['v*']
  # Manual trigger so a tag can be (re)built if its automatic run
  # failed, or for building an image for a pre-existing tag that
  # predates this workflow. Pass the tag name as the `tag` input.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.5.3)'
        required: true
        type: string

permissions:
  contents: write     # upload SBOM to the release
  packages: write     # push to ghcr.io
  id-token: write     # cosign keyless OIDC

jobs:
  build-push-sign:
    runs-on: ubuntu-24.04
    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-ref: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          # On workflow_dispatch, ref is the input tag; on push, it's
          # the pushed tag already (github.ref).
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Compute version inputs
        id: version
        # Centralise tag/version derivation so both triggers produce
        # identical image tags and GH-release targets downstream.
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "No tag resolved; refusing to build without a version."
            exit 1
          fi
          VERSION="${TAG#v}"
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          echo "Computed: tag=$TAG version=$VERSION major_minor=$MAJOR_MINOR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install host tools used by the Makefile
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends make unzip

      - name: make (build agent jar + stage controller)
        # Populate dist/ so the Dockerfile's COPY dist/... steps resolve.
        # Running the same `make` target CI uses for the release tarball,
        # so the image contents match the tarball contents bit-for-bit.
        run: make

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag with leading 'v', tag without 'v', and major.minor
            # floating tag so consumers can pin at whatever strictness
            # level they want. :latest moves with each new tag;
            # reproducible deployments should pin to the digest instead.
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=IB Gateway controller — Python/Java replacement for IBC, shipped as a headless Docker image.
            org.opencontainers.image.licenses=MIT

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Pin the upstream Gateway base by digest so published releases
          # don't silently track `:stable`. Bump this in lockstep with a
          # deliberate Gateway-version upgrade. Multi-arch manifest (amd64
          # + arm64) as of 10.45.1c, sha256:b4ede80…
          build-args: |
            UPSTREAM_IMAGE=ghcr.io/gnzsnz/ib-gateway:10.45.1c@sha256:b4ede803caf48279b4bdc21c8de1fb19edaef8bedbb2b49153e72b042f660bf3
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Embed buildx provenance so `docker buildx imagetools inspect`
          # can reconstruct the build graph. Distinct from cosign
          # provenance signing below — this is OCI-level attestation,
          # cosign is Sigstore-level.
          provenance: true
          sbom: false   # we generate our own below with syft
          # GHA cache keeps incremental rebuilds fast across tag bumps.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign image with cosign (keyless)
        # Uses the Github OIDC token as the identity; no private key
        # needed and no secret to manage. The signature is stored as
        # an OCI artifact next to the image in ghcr.io.
        env:
          IMAGE_DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          # Sign each tag the build produced, referenced by digest to
          # avoid tag-race weirdness.
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            ref="${tag}@${IMAGE_DIGEST}"
            echo "Signing $ref"
            cosign sign --yes "$ref"
          done

      - name: Generate SPDX SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM with cosign
        env:
          IMAGE_DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          # Attach the SBOM as a signed attestation. Consumers can
          # fetch + verify with: cosign verify-attestation --type spdxjson
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "ghcr.io/${{ github.repository }}@${IMAGE_DIGEST}"

      - name: Wait for GitHub release to exist
        # ci.yml races us to create the release object. Poll until it's
        # there (max 5 min) before trying to upload the SBOM, so the
        # upload doesn't race the creation.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG exists after ${i} poll(s)"
              exit 0
            fi
            echo "Waiting for release $TAG to be created... ($i/30)"
            sleep 10
          done
          echo "Release $TAG did not appear within 5 minutes; ci.yml failed or is stuck."
          exit 1

      - name: Upload SBOM as release asset
        # Also expose the SBOM on the GitHub release page so consumers
        # who don't have cosign installed can still inspect it.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "$TAG" sbom.spdx.json --clobber \
            --repo "$GITHUB_REPOSITORY"

      - name: Print verification recipe
        # Summary block users can copy-paste to verify what just shipped.
        run: |
          cat <<EOF
          ================================================================
          Image published: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          Digest:         ${{ steps.build-push.outputs.digest }}

          Verify signature:
            cosign verify \\
              --certificate-identity-regexp '^https://github.com/${{ github.repository }}/\.github/workflows/release-image\.yml@' \\
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
              ghcr.io/${{ github.repository }}@${{ steps.build-push.outputs.digest }}

          Verify + extract SBOM:
            cosign verify-attestation --type spdxjson \\
              --certificate-identity-regexp '^https://github.com/${{ github.repository }}/\.github/workflows/release-image\.yml@' \\
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
              ghcr.io/${{ github.repository }}@${{ steps.build-push.outputs.digest }} \\
              | jq -r '.payload' | base64 -d | jq '.predicate' > sbom.spdx.json
          ================================================================
          EOF
