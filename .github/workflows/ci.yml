name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install host tools used by the Makefile
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends make unzip

      - name: make clean
        run: make clean

      - name: make (build agent jar + stage controller)
        run: make

      - name: make test (py_compile + agent manifest check + unit tests)
        run: make test

      - name: make release (build tarball)
        # On tag pushes GITHUB_REF_NAME is e.g. "v0.5.13" → "0.5.13".
        # On main pushes it's "main". On pull_request events it's
        # "<num>/merge" — the slash leaks into the tarball path and
        # breaks the glob in the next step, so squash any "/" to "-".
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION//\//-}
          make release VERSION="$VERSION"

      - name: Verify tarball layout
        run: |
          tar -tzf dist/ibg-controller-*.tar.gz

      - name: Verify install.sh extracts cleanly
        run: |
          mkdir -p /tmp/install-test /tmp/install-dest
          cd /tmp/install-test
          tar -xzf $GITHUB_WORKSPACE/dist/ibg-controller-*.tar.gz
          cd ibg-controller-*
          DESTDIR=/tmp/install-dest ./install.sh
          test -f /tmp/install-dest/gateway-input-agent.jar
          test -f /tmp/install-dest/scripts/gateway_controller.py

      - name: Upload release tarball (artifact)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: dist/ibg-controller-*.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" dist/ibg-controller-*.tar.gz \
            --title "$TAG" \
            --notes "See [CHANGELOG.md](https://github.com/code-hustler-ft3d/ibg-controller/blob/main/CHANGELOG.md) for details." \
            --repo "$GITHUB_REPOSITORY"

  smoke-test-image:
    runs-on: ubuntu-24.04
    needs: build-and-test
    # Smoke-test in a Docker container that mirrors the target
    # runtime: Python 3 + pyatspi2 + ATK bridge. Verifies the module
    # loads with the real gi stack (not just mocked sys.modules).
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install build + runtime deps on the runner
        # The runner is ubuntu-24.04 — the same distro we previously
        # docker-run'd into for this smoke test. Running the smoke
        # directly on the runner drops an unreliable hop (docker's
        # NAT network couldn't reach archive.ubuntu.com on 2026-04-17,
        # failing the original docker-apt-install flow even though
        # the runner's own apt was fine).
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            make unzip \
            python3 python3-gi gir1.2-atspi-2.0 at-spi2-core

      - name: make
        run: make

      - name: Real-pyatspi2 module-load smoke test
        env:
          TWS_USERID: x
          TWS_PASSWORD: x
          TRADING_MODE: paper
        run: |
          python3 - <<'PY'
          import sys
          sys.path.insert(0, ".")
          import gateway_controller as gc
          print("module loaded, version check OK")
          print(f"  TRADING_MODE={gc.TRADING_MODE}")
          print(f"  APP_NAME_CANDIDATES={gc.APP_NAME_CANDIDATES}")
          print(f"  SAFE_DISMISS_BUTTONS has {len(gc.SAFE_DISMISS_BUTTONS)} entries")
          PY

  gateway-version-matrix:
    runs-on: ubuntu-24.04
    needs: build-and-test
    # Build the shipped Dockerfile against multiple gnzsnz/ib-gateway
    # upstream tags so we catch breakage from an upstream layout change
    # (JRE path, apt package rename, userid shift) before users do.
    #
    # The matrix covers the two Gateway versions we actively verify
    # against — the prior stable (10.44.1g) and the current stable
    # (10.45.1c). Add a new entry here when bumping verified versions
    # in README.md / docs/FROM_IBC.md.
    strategy:
      fail-fast: false
      matrix:
        upstream:
          - ghcr.io/gnzsnz/ib-gateway:10.44.1g
          - ghcr.io/gnzsnz/ib-gateway:10.45.1c
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install host tools used by the Makefile
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends make unzip

      - name: make (populate dist/ for COPY)
        run: make

      - name: Build image against ${{ matrix.upstream }}
        run: |
          docker build \
            --build-arg UPSTREAM_IMAGE=${{ matrix.upstream }} \
            -t ibg-controller:matrix-test .

      - name: Container-level module-load smoke test
        # Verify gateway_controller.py imports cleanly against the JRE +
        # AT-SPI + ATK-bridge wiring inside the built image. Catches
        # upstream base-image drift (missing libs, changed paths) at CI
        # time rather than at runtime on a user's host.
        env:
          TWS_USERID: x
          TWS_PASSWORD: x
          TRADING_MODE: paper
        run: |
          docker run --rm \
            -e TWS_USERID -e TWS_PASSWORD -e TRADING_MODE \
            --entrypoint python3 \
            ibg-controller:matrix-test \
            -c 'import sys; sys.path.insert(0, "/home/ibgateway/scripts"); import gateway_controller as gc; print(f"OK upstream={gc.__version__} TRADING_MODE={gc.TRADING_MODE}")'

      - name: Verify ATK bridge wiring inside image
        # accessibility.properties must be present in the Gateway JRE
        # conf dir, and libatk-wrapper.so must live in the JRE lib dir.
        # Checks both without starting Gateway itself.
        run: |
          docker run --rm --entrypoint bash ibg-controller:matrix-test -c '
            set -e
            GW_JAVA=$(find /usr/local/i4j_jres -name java -type f 2>/dev/null | head -1)
            if [ -z "$GW_JAVA" ]; then
              GW_JAVA=$(find /usr/local -path "*/zulu*/bin/java" -type f 2>/dev/null | head -1)
            fi
            JAVA_HOME=$(dirname $(dirname "$GW_JAVA"))
            echo "JAVA_HOME=$JAVA_HOME"
            test -f "$JAVA_HOME/conf/accessibility.properties" \
              && echo "OK accessibility.properties present"
            ls "$JAVA_HOME/lib/" | grep -q libatk-wrapper \
              && echo "OK libatk-wrapper.so in JRE lib dir"
          '
